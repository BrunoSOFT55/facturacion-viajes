<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Presupuesto</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#e6ebf2;
  font-family:'Segoe UI',sans-serif;
}

.documento{
  max-width:900px;
  margin:20px auto;
  background:#fff;
  box-shadow:0 15px 40px rgba(0,0,0,.15);
}

/* Encabezado */
.encabezado-img img{
  width:100%;
  display:block;
}

/* Contenido */
.contenido{
  padding:40px;
  font-size:16px;
  line-height:1.7;
}

input, textarea{
  border:1px solid #ccc;
}

/* Botones */
.acciones{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.acciones .btn{
  min-width:220px;
  padding:12px 18px;
  font-weight:600;
  font-size:15px;
}

/* Impresión */
/* Impresión */
@media print {
  body { background:#fff; margin:0; }
  .documento { max-width:100%; margin:0 auto; box-shadow:none; width:100%; }

  /* Ocultar todos los elementos de pantalla */
  .pantalla { display:none; }

  /* Mostrar solo el div de impresión */
  .imprimir { display:block; }

  /* Márgenes laterales */
  @page { margin:0 1.5cm; }

  /* NUEVO: Fuente Arial 12pt e interlineado 1,5 */
  #printArea {
    font-family: Arial, sans-serif;
    font-size: 12pt;
    line-height: 1.5;
  }
}
</style>
</head>

<body>

<div class="documento">

  <!-- Encabezado: solo la imagen -->
  <div class="encabezado-img">
    <img src="solapa_new01.jpeg" alt="Altamirano Nosiglia Viajes">
  </div>

  <div class="contenido">

    <!-- Formulario en pantalla -->
    <div class="row mb-3 pantalla">
      <div class="col-md-6">
        <strong>Cliente:</strong>
        <input type="text" id="cliente" class="form-control">
      </div>
      <div class="col-md-3 pantalla">
        <strong>Fecha:</strong>
        <input type="date" id="fecha" class="form-control">
      </div>
      <div class="col-md-3 pantalla">
        <strong>Presupuesto N°</strong>
        <input type="text" id="numero" class="form-control" placeholder="00000">
      </div>
    </div>

    <div class="mb-4 pantalla">
      <textarea id="detalle" class="form-control" rows="7"></textarea>
    </div>

    <p class="text-center mt-4 pantalla">
      <strong>GRACIAS POR SU CONFIANZA</strong>
    </p>

    <!-- Botones -->
    <div class="btn-imprimir acciones mt-4 pantalla">
      <button onclick="window.location.href='index.html'" class="btn btn-outline-secondary">
        ← Volver a Comprobantes
      </button>

      <button onclick="prepararImpresion()" class="btn btn-primary">
        🖨 Imprimir Presupuesto
      </button>
    </div>

    <!-- Contenido solo para impresión -->
    <div class="imprimir" id="printArea" style="display:none;"></div>

  </div>
</div>

<script>
function prepararImpresion() {
  const cliente = document.getElementById('cliente').value || '';
  const fecha = document.getElementById('fecha').value || '';
  const numero = document.getElementById('numero').value || '';
  const detalle = document.getElementById('detalle').value || '';

  const printDiv = document.getElementById('printArea');
  printDiv.innerHTML = `
    <p><strong>Cliente:</strong> ${cliente}</p>
    <p><strong>Fecha:</strong> ${fecha}</p>
    <p><strong>Presupuesto N°:</strong> ${numero}</p>
    <p>${detalle.replace(/\n/g,'<br>')}</p>
    <p class="text-center mt-4"><strong>GRACIAS POR SU CONFIANZA</strong></p>
  `;

  // Mostrar el div de impresión y ocultar elementos de pantalla
  printDiv.style.display = 'block';

  window.print();

  // Restaurar después de imprimir
  printDiv.style.display = 'none';
}
</script>

</body>
</html>
